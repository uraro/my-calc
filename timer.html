<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メンズトーク・MAXタイマー</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }
        #label { font-size: 12vw; font-weight: 900; line-height: 1.0; text-align: center; }
        #timer { font-size: 35vw; font-weight: 900; line-height: 0.8; font-variant-numeric: tabular-nums; letter-spacing: -0.05em; }
        
        /* 画面全体を覆う透明なボタン（初回タップ用） */
        #fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: #fff;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; font-size: 5vw; text-align: center;
        }

        .color-green { color: #00ff00; }
        .color-red   { color: #ff0000; }
        .color-blue  { color: #00bfff; }
    </style>
</head>
<body onclick="enableFullScreen()">

    <div id="fullscreen-overlay">画面をタップして<br>全画面タイマーを開始</div>

    <div id="label">---</div>
    <div id="timer">00:00</div>

    <script>
        // 全画面モードを起動する関数
        function enableFullScreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen();
            }
            // オーバーレイを消す
            document.getElementById('fullscreen-overlay').style.display = 'none';
        }

        const timerDisplay = document.getElementById('timer');
        const labelDisplay = document.getElementById('label');

        function updateTimer() {
            const now = new Date();
            const t1900 = new Date(now); t1900.setHours(19, 0, 0, 0);
            const t1930 = new Date(now); t1930.setHours(19, 30, 0, 0);
            const t2100 = new Date(now); t2100.setHours(21, 0, 0, 0);

            let displaySeconds;
            let labelText = "";
            let colorClass = "";

            if (now < t1900) {
                labelText = "ビフォータイム";
                colorClass = "color-green";
                displaySeconds = Math.ceil((t1900 - now) / 1000);
            } else if (now >= t1900 && now < t1930) {
                labelText = "ON AIR";
                colorClass = "color-red";
                displaySeconds = Math.ceil((t1930 - now) / 1000);
            } else if (now >= t1930 && now <= t2100) {
                labelText = "アフタートーク";
                colorClass = "color-blue";
                displaySeconds = Math.floor((now - t1930) / 1000);
            } else {
                labelText = "WAITING";
                colorClass = "color-white";
                let target = new Date(now);
                target.setDate(target.getDate() + 1);
                target.setHours(19, 0, 0, 0);
                displaySeconds = Math.ceil((target - now) / 1000);
            }

            const m = Math.floor(displaySeconds / 60);
            const s = displaySeconds % 60;
            timerDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            labelDisplay.textContent = labelText;
            timerDisplay.className = colorClass;
            labelDisplay.className = colorClass;
        }

        setInterval(updateTimer, 100);
        updateTimer();
    </script>
</body>
</html>

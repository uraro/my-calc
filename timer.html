<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メンズトーク・タイマー</title>
    
    <!-- アプリとして全画面表示するための必須設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #label {
            font-size: 12vw; 
            font-weight: 900;
            line-height: 1.0;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 1vh;
        }

        #timer {
            font-size: 35vw; 
            font-weight: 900;
            line-height: 0.8;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
        }

        #sync-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .color-green { color: #00ff00; }
        .color-red   { color: #ff0000; }
        .color-blue  { color: #00bfff; }
        .color-white { color: #ffffff; }
    </style>
</head>
<body>

    <div id="label">---</div>
    <div id="timer">00:00</div>
    <button id="sync-btn" onclick="location.reload()">SYNC</button>

    <script>
        const timerDisplay = document.getElementById('timer');
        const labelDisplay = document.getElementById('label');

        function updateTimer() {
            const now = new Date();
            const t1900 = new Date(now); t1900.setHours(19, 0, 0, 0);
            const t1930 = new Date(now); t1930.setHours(19, 30, 0, 0);
            const t2100 = new Date(now); t2100.setHours(21, 0, 0, 0);

            let displaySeconds;
            let labelText = "";
            let colorClass = "";

            if (now < t1900) {
                labelText = "ビフォータイム";
                colorClass = "color-green";
                displaySeconds = Math.ceil((t1900 - now) / 1000);
            } 
            else if (now >= t1900 && now < t1930) {
                labelText = "ON AIR";
                colorClass = "color-red";
                displaySeconds = Math.ceil((t1930 - now) / 1000);
            } 
            else if (now >= t1930 && now <= t2100) {
                labelText = "アフタートーク";
                colorClass = "color-blue";
                displaySeconds = Math.floor((now - t1930) / 1000);
            } 
            else {
                labelText = "WAITING";
                colorClass = "color-white";
                let target = new Date(now);
                target.setDate(target.getDate() + 1);
                target.setHours(19, 0, 0, 0);
                displaySeconds = Math.ceil((target - now) / 1000);
            }

            const m = Math.floor(displaySeconds / 60);
            const s = displaySeconds % 60;
            timerDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            labelDisplay.textContent = labelText;
            timerDisplay.className = colorClass;
            labelDisplay.className = colorClass;
        }

        setInterval(updateTimer, 100);
        updateTimer();
        
        // 画面スリープ防止（一部のブラウザで有効）
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(()=>{});
        }
    </script>
</body>
</html>
